spring.application.name=author_book_management

server.port = 8081

spring.jpa.hibernate.ddl-auto=update

spring.datasource.url=jdbc:postgresql://localhost:5432/library_db
spring.datasource.username=library_user
spring.datasource.password=library123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.security.user.name=user123
spring.security.user.password=pass123

# ??? Logging to file ???????????????????????????????????????????????????????
# Current log file (always up-to-date)
logging.file.name=logs/app.log

# Rolling policy ? new file each day, keep 30 days, max 10 MB per file
logging.logback.rollingpolicy.file-name-pattern=logs/app-%d{yyyy-MM-dd}.%i.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=200MB

# Log pattern for the file (timestamp | level | thread | logger | message)
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Show AOP logs at INFO level (default); change to DEBUG for more detail
logging.level.com.sarthak.library.author_book_management.aspect=INFO

